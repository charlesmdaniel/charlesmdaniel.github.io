<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charles M. Daniel</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
      padding: 48px 24px;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .links {
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      color: #111111;
      text-decoration: none;
      border-bottom: 1px solid #111111;
      padding-bottom: 2px;
    }

    .links a:hover {
      opacity: 0.65;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Charles M. Daniel</h1>
    <p>
      I build at the intersection of music, narrative, finance, and media.
      This is my personal home page.
    </p>

    <div class="links">
      <a href="https://www.instagram.com/" target="_blank">Instagram</a>
      <a href="https://x.com/" target="_blank">X</a>
      <a href="https://www.linkedin.com/" target="_blank">LinkedIn</a>
      <a href="https://www.youtube.com/" target="_blank">YouTube</a>
      <a href="mailto:youremail@example.com">Email</a>
    </div>
  </div>
</body>
</html>
