<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charles M. Daniel</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #111111;
    }

    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    .hero {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 48px;
      align-items: start;
    }

    .photo img {
      width: 100%;
      max-width: 280px;
      height: auto;
      display: block;
      border-radius: 2px;
    }

    .content h1 {
      margin: 0 0 18px 0;
      font-size: 38px;
      font-weight: 600;
      line-height: 1.1;
    }

    .content p {
      margin: 0 0 22px 0;
      font-size: 18px;
      line-height: 1.7;
      max-width: 620px;
    }

    .socials {
      display: flex;
      gap: 18px;
      align-items: center;
      margin: 0 0 28px 0;
      flex-wrap: wrap;
    }

    .socials a {
      color: #111111;
      font-size: 24px;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .socials a:hover {
      opacity: 0.6;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 420px;
    }

    .buttons a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      text-decoration: none;
      color: #111111;
      border: 1px solid #111111;
      padding: 12px 18px;
      font-size: 16px;
      transition: background 0.2s ease, color 0.2s ease, opacity 0.2s ease;
    }

    .buttons a:hover {
      background: #111111;
      color: #ffffff;
    }

    .arrow {
      font-size: 18px;
      line-height: 1;
    }

    @media (max-width: 768px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 28px;
      }

      .photo img {
        max-width: 240px;
      }

      .content h1 {
        font-size: 32px;
      }

      .content p {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div class="photo">
        <img src="charles-photo.jpg" alt="Charles M. Daniel" />
      </div>

      <div class="content">
        <h1>Charles M. Daniel</h1>

        <p>
          I build at the intersection of art, pipeline, generative ai and narrative equity. A unique combination of skills at your service.
        </p>

        <div class="socials">
          <a href="https://www.instagram.com/charlesmdaniel" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
            <i class="fa-brands fa-instagram"></i>
          </a>

          <a href="https://x.com/charlesmdaniel" target="_blank" rel="noopener noreferrer" aria-label="X">
            <i class="fa-brands fa-x-twitter"></i>
          </a>

          <a href="https://www.linkedin.com/in/charlesmdaniel/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
            <i class="fa-brands fa-linkedin-in"></i>
          </a>

          <a href="https://www.youtube.com/@charlesmdaniel" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
            <i class="fa-brands fa-youtube"></i>
          </a>

          <a href="mailto:charlesmdaniel9@gmail.com" aria-label="Email">
            <i class="fa-solid fa-envelope"></i>
          </a>
        </div>

        <div class="buttons">
          <a href="charles-m-daniel-resume-2026.pdf" target="_blank" rel="noopener noreferrer">
            <span class="arrow">›</span><span>resume</span>
          </a>

          <a href="https://beacons.ai/charlesmdaniel" target="_blank" rel="noopener noreferrer">
            <span class="arrow">›</span><span>music</span>
          </a>

          <a href="https://substack.com/@charlesmdaniel" target="_blank" rel="noopener noreferrer">
            <span class="arrow">›</span><span>literature</span>
          </a>

          <a href="https://www.youtube.com/@charlesmdaniel" target="_blank" rel="noopener noreferrer">
            <span class="arrow">›</span><span>film</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
